name: kids_tube
description: "A YouTube Kids clone for offline learning."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  video_player: ^2.8.1
  file_picker: ^8.0.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.1
  path: ^1.9.0
  # MPV-based video engine (replaces fvp for smoother seeking & playback)
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  video_player_media_kit: ^2.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
